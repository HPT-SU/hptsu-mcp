# nginx-конфиг для поддомена mcp.hpt.su.
# Подключается в основной nginx сервера hpt.su (рядом с конфигом hpt.su).
#
# Что делает:
#   * Терминирует TLS для mcp.hpt.su (Let's Encrypt / certbot — настраиваешь отдельно).
#   * Проксирует на контейнер mcp:8000 (имя из docker-compose.example.yml).
#   * Поддерживает Server-Sent Events (streaming) — буферизация выключена.
#   * Forwarded-заголовки для корректных IP в логах MCP.

upstream hptsu_mcp_upstream {
    # Docker resolves `mcp` через внутренний DNS сети hpt_su_internal.
    server mcp:8000 max_fails=3 fail_timeout=30s;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name mcp.hpt.su;

    ssl_certificate     /etc/letsencrypt/live/mcp.hpt.su/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mcp.hpt.su/privkey.pem;
    # Остальные ssl-* параметры — из общего include.

    # Логи отдельно от основного сайта — проще считать MCP-трафик.
    access_log /var/log/nginx/mcp.hpt.su.access.log;
    error_log  /var/log/nginx/mcp.hpt.su.error.log warn;

    # Health-check для внешнего мониторинга — отдельный location без auth.
    location = /healthz {
        access_log off;
        proxy_pass http://hptsu_mcp_upstream/healthz;
        proxy_http_version 1.1;
    }

    location = /readyz {
        access_log off;
        proxy_pass http://hptsu_mcp_upstream/readyz;
        proxy_http_version 1.1;
        proxy_read_timeout 10s;
    }

    # Главный MCP-эндпойнт.
    location / {
        proxy_pass http://hptsu_mcp_upstream;
        proxy_http_version 1.1;

        # Streaming / SSE — буферизация ОБЯЗАТЕЛЬНО отключена.
        proxy_buffering    off;
        proxy_cache        off;
        proxy_read_timeout 24h;
        proxy_send_timeout 24h;

        # Connection: keep-alive для SSE.
        proxy_set_header Connection        "";
        proxy_set_header Upgrade            $http_upgrade;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header X-Forwarded-Host   $host;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name mcp.hpt.su;

    # ACME-challenge для certbot — должно быть до 301.
    location /.well-known/acme-challenge/ {
        root /var/www/acme;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}
